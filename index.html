<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Podcast App</title>
        <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
    </head>
    <body>
        <header class="app-header">
            <div class="left-heading">
                <img src="podcast_12513843.png" alt="Podcast Icon" class="header-icon" />
                <h1>Podcast App</h1>
            </div>
            <div class="right-heading">
                <button class="search-icon" aria-label="Search Tool">
                <img src="search_17216943.png" alt="Search Icon" class="search-icon" id="searchIcon" />
                </button>
                <img src="man-hair_358274.png" alt="Profile Icon" class="profile-icon" />
            </div>
        </header>

        <main id="podcastGrid" class="grid"></main>

        <!-- Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <div class="title-section">
                    <h2 id="modalTitle"></h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="banner">
                    <img id="modalImage" class="modal-img" />
                    <div class="info-section">
                        <h3>Description</h3>
                        <p id="modalDesc"></p>
                        <h3>Genres</h3>
                        <div id="modalGenres" class="tags"></div>
                        <p id="modalUpdated" class="modal-updated-text"></p>
                    </div>
                </div>
                <h3>Seasons</h3>
                <ul id="seasonList" class="season-list"></ul>
            </div>
        </div>
        
        <script type="module" defer src="./src/index.js"></script>
    </body>
</html>
